<div id="tab-settings" class="tab-panel">
    <div class="page-title-bar">
        <span class="page-title-tab active">Settings</span>
    </div>
    <div class="page-body">
        <div class="portlet">
            <div class="portlet-title">Global Exception Delay</div>
            <form id="settings-form">
                <div class="ds-field">
                    <label>Delay Duration</label>
                    <div class="delay-inputs-group">
                        <div class="flex-1">
                            <label for="global-delay-hours" class="delay-label">Hours</label>
                            <input type="number" id="global-delay-hours" class="ds-input" min="0" step="1" placeholder="0" required />
                        </div>
                        <div class="flex-1">
                            <label for="global-delay-minutes" class="delay-label">Minutes</label>
                            <input type="number" id="global-delay-minutes" class="ds-input" min="0" max="59" step="1" placeholder="0" required />
                        </div>
                    </div>
                    <small class="delay-note">
                        Note: Increasing the delay takes effect immediately. Decreasing the delay will be subject to the current delay period before it takes effect.
                    </small>
                </div>
                <button type="submit" id="settings-submit-btn" class="btn btn-primary">Update Global Delay</button>
                <div id="settings-toast" class="settings-toast">Settings updated successfully.</div>
            </form>
        </div>
    </div>
</div>
