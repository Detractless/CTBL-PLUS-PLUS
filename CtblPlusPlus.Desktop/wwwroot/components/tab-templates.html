<div id="tab-templates" class="tab-panel">
    <div class="page-title-bar">
        <span class="page-title-tab active">Templates & Setup</span>
    </div>
    <div class="page-body">

        <div class="templates-toolbar">
            <div class="templates-search-wrapper">
                <input type="text" id="templates-search" class="ds-input" placeholder="Search templates... (e.g. #productivity, Detractless)">
            </div>
            
            <div class="dropdown-wrapper">
                <button type="button" class="dropdown-trigger" id="templates-dd-trigger" title="Filter" aria-label="Filter options">
                    <span class="icon">
                        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    </span>
                    <span class="filter-badge" id="templates-filter-badge"></span>
                </button>

                <div class="dropdown-menu" id="templates-dd-menu">

                    <div class="filter-summary" id="templates-filter-summary">
                        <span class="filter-summary-tag" id="templates-summary-field" style="display: none;">
                            <span class="tag-label">Field:</span>
                            <span class="tag-value" id="templates-summary-field-value"></span>
                        </span>
                    </div>

                    <div class="dropdown-slider" id="templates-dd-slider">
                        <div class="dropdown-view">
                            <button class="dropdown-item active" id="templates-dd-all">All Templates</button>
                            <button class="dropdown-item dd-show-submenu" data-target="field" data-title="Field" id="templates-dd-show-field">
                                <span>Field</span>
                                <span class="chevron-right"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item" id="templates-clear-filters" style="color: var(--color-danger);">Clear Filters</button>
                        </div>

                        <div class="dropdown-view">
                            <div class="submenu-header">
                                <button class="submenu-back" id="templates-dd-hide-submenu">
                                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg> Back
                                </button>
                                <span class="submenu-title" id="templates-submenu-title-text">Field</span>
                            </div>
                            
                            <div class="submenu-content-block" id="templates-submenu-field" style="display: none;">
                                <button class="dropdown-item filter-group-field submenu-item" data-value="title" data-parent="templates-dd-show-field">Name</button>
                                <button class="dropdown-item filter-group-field submenu-item" data-value="author" data-parent="templates-dd-show-field">Creator</button>
                                <button class="dropdown-item filter-group-field submenu-item" data-value="tags" data-parent="templates-dd-show-field">Tags</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="templates-gallery" class="templates-gallery">
            <div class="loading-state">Loading community templates...</div>
        </div>

        <!-- Modal for viewing list -->
        <div id="list-preview-modal" class="list-preview-modal">
            <div class="list-preview-content">
                <div class="list-preview-header">
                    <div>
                        <h2 id="preview-title">Template Name</h2>
                        <span id="preview-author" class="template-author" style="font-size: 0.85rem;"></span>
                    </div>
                    <div class="preview-header-actions" style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary btn-sm" id="toggle-raw-btn">View Raw JSON</button>
                        <button class="btn btn-secondary btn-sm" id="close-preview-btn">Close</button>
                    </div>
                </div>
                
                <p id="preview-description" class="template-description" style="margin-bottom: 0.5rem;"></p>

                <!-- Visual View -->
                <div id="preview-visual-view" class="preview-visual-view">
                    <!-- Key metrics / Locks row -->
                    <div class="preview-metrics-grid">
                        <div class="metric-card">
                            <span class="metric-label">Lock Type</span>
                            <span class="metric-value" id="preview-lock-type">None</span>
                        </div>
                        <div class="metric-card">
                            <span class="metric-label">Schedule</span>
                            <span class="metric-value" id="preview-schedule">Continuous</span>
                        </div>
                        <div class="metric-card">
                            <span class="metric-label">Breaks</span>
                            <span class="metric-value" id="preview-breaks">None</span>
                        </div>
                    </div>

                    <!-- Tabs for content -->
                    <div id="ct-native-popup" class="ct-portlet">
                        <div class="ct-portlet-title ct-tabbable-line">
                            <ul class="ct-nav ct-nav-tabs">
                                <li class="active">
                                    <a class="ct-preview-tab" data-target="preview-websites">Websites (<span id="count-websites">0</span>)</a>
                                </li>
                                <li>
                                    <a class="ct-preview-tab" data-target="preview-apps">Apps (<span id="count-apps">0</span>)</a>
                                </li>
                                <li>
                                    <a class="ct-preview-tab" data-target="preview-exceptions">Exceptions (<span id="count-exceptions">0</span>)</a>
                                </li>
                            </ul>
                        </div>
                        <div class="ct-portlet-body">
                            <div class="ct-tab-content">
                                <div class="ct-tab-pane active" id="preview-websites">
                                    <div class="ct-form-body">
                                        <div class="ct-form-group ct-center">
                                            <div class="ct-custom-select" id="list-websites"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-tab-pane" id="preview-apps">
                                    <div class="ct-form-body">
                                        <div class="ct-form-group ct-center">
                                            <div class="ct-custom-select ct-app" id="list-apps"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-tab-pane" id="preview-exceptions">
                                    <div class="ct-form-body">
                                        <div class="ct-form-group ct-center">
                                            <div class="ct-custom-select" id="list-exceptions"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Raw View (Hidden by default) -->
                <textarea id="preview-textarea" class="list-preview-textarea" readonly style="display: none;"></textarea>

                <div class="template-actions-row" style="margin-top: 1rem;">
                    <button class="btn btn-primary" id="preview-copy-btn">Copy to Clipboard</button>
                    <button class="btn btn-info" id="preview-download-btn">Download .ctbbl</button>
                </div>
            </div>
        </div>


    </div>
</div>
